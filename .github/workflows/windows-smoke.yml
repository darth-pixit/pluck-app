# Runtime smoke test for the Windows desktop app.
#
# The build-smoke matrix in tests.yml only proves the Windows target *compiles*;
# nothing in CI ever executed the binary before this workflow existed. This job
# installs the real MSI, launches the real exe, and proves the core promise on
# an actual Windows machine: a clipboard write lands in Pluks history.
#
# What it does NOT prove (needs a human at a real desktop): drag-select /
# double-click capture in third-party apps, overlay rendering & DPI, tray
# interaction with a real shell, autostart across reboots, the updater upgrade
# path. The website's "Beta" label on the Windows download reflects exactly
# this boundary.
name: Windows Smoke

on:
  workflow_dispatch:
    inputs:
      msi_source:
        description: "MSI to test: build from this ref, or download the latest published release"
        type: choice
        options: [build, latest-release]
        default: build
  # Called by release.yml after publishing, with msi_source=latest-release —
  # this is what makes "every release is install- and run-tested on Windows"
  # (website/README) literally true.
  workflow_call:
    inputs:
      msi_source:
        type: string
        default: build
  # PRs that touch the app get the full install/launch/capture run against
  # their own MSI.
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/windows-smoke.yml"

concurrency:
  group: win-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Install, launch, capture (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      # Diagnosis affordances FIRST — no human has a Windows box to reproduce
      # failures on, so every crash must leave a post-mortemable trace.
      - name: Enable Windows Error Reporting local crash dumps
        run: |
          New-Item -Force -ItemType Directory C:\werdumps | Out-Null
          reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps" /v DumpFolder /t REG_EXPAND_SZ /d C:\werdumps /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps" /v DumpType /t REG_DWORD /d 2 /f

      - name: Ensure WebView2 runtime
        run: |
          $key = Get-ItemProperty -ErrorAction SilentlyContinue `
            "HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}"
          if ($key) {
            Write-Host "WebView2 runtime present: $($key.pv)"
          } else {
            Write-Host "WebView2 runtime missing - installing"
            Invoke-WebRequest "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile wv2.exe
            Start-Process .\wv2.exe -ArgumentList "/silent","/install" -Wait
          }

      - uses: actions/setup-node@v4
        if: ${{ github.event_name == 'pull_request' || inputs.msi_source == 'build' }}
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ github.event_name == 'pull_request' || inputs.msi_source == 'build' }}
      # See the long comment in release.yml. Same workaround: bootstrap
      # rustup from scratch on Windows, then prepend ~/.cargo/bin to
      # GITHUB_PATH so subsequent `cargo` calls hit the real shim
      # instead of the runner image's broken rustup-init-as-cargo stub.
      - name: Bootstrap Rust toolchain (Windows image workaround)
        if: ${{ github.event_name == 'pull_request' || inputs.msi_source == 'build' }}
        run: |
          $rustupInit = "$env:TEMP\rustup-init.exe"
          Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile $rustupInit
          & $rustupInit --default-toolchain stable --profile minimal -y --quiet
          if ($LASTEXITCODE -ne 0) { throw "rustup-init failed with $LASTEXITCODE" }
          "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          & "$env:USERPROFILE\.cargo\bin\cargo.exe" --version
      - uses: Swatinem/rust-cache@v2
        if: ${{ github.event_name == 'pull_request' || inputs.msi_source == 'build' }}
        with:
          workspaces: app/src-tauri -> target

      # PLACEHOLDER values trip analytics.ts's isRealKey() guard, disabling
      # PostHog/Sentry at build time. tauri.smoke.conf.json additionally turns
      # off updater-artifact signing (no key in this workflow) and skips the
      # NSIS bundle. The pre-seeded settings.json below is the second,
      # runtime-level analytics kill — it also covers latest-release mode,
      # where the MSI was built with real keys.
      - name: Build MSI from this ref
        if: ${{ github.event_name == 'pull_request' || inputs.msi_source == 'build' }}
        working-directory: app
        env:
          VITE_POSTHOG_KEY: PLACEHOLDER
          VITE_SENTRY_DSN: PLACEHOLDER
        run: |
          npm ci
          npx tauri build --config src-tauri/tauri.smoke.conf.json
          $msi = Get-ChildItem src-tauri/target/release/bundle/msi/*.msi | Select-Object -First 1
          if (-not $msi) { throw "tauri build produced no MSI" }
          "PLUKS_MSI=$($msi.FullName)" >> $env:GITHUB_ENV

      - name: Download MSI from latest release
        if: ${{ inputs.msi_source == 'latest-release' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -Force -ItemType Directory release-msi | Out-Null
          gh release download --repo ${{ github.repository }} --pattern "*.msi" --dir release-msi
          $msi = Get-ChildItem release-msi/*.msi | Select-Object -First 1
          if (-not $msi) { throw "latest release has no MSI asset" }
          "PLUKS_MSI=$($msi.FullName)" >> $env:GITHUB_ENV

      - name: Pre-seed app data (telemetry off, deterministic anon id)
        run: |
          $dir = Join-Path $env:APPDATA "app.pluks.desktop"
          New-Item -Force -ItemType Directory $dir | Out-Null
          @'
          {"anon_id":"00000000-0000-4000-8000-0000c1c1c1c1","opt_out":true,"crash_opt_out":true}
          '@ | Set-Content (Join-Path $dir "settings.json")
          Get-Content (Join-Path $dir "settings.json")

      - name: Install MSI silently
        run: |
          Write-Host "Installing $env:PLUKS_MSI"
          $p = Start-Process msiexec -ArgumentList "/i","`"$env:PLUKS_MSI`"","/qn","/l*v","msi-install.log" -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "msiexec exited with $($p.ExitCode)" }

      - name: Locate installed exe
        run: |
          # productName is "Pluks" (install dir) but the binary keeps the
          # crate name "pluck" — Tauri 2 does not rename it. Check both.
          $exe = @(
            "C:\Program Files\Pluks\pluck.exe",
            "C:\Program Files\Pluks\Pluks.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exe) {
            Write-Host "Known paths missing - searching"
            $hit = Get-ChildItem "C:\Program Files","C:\Program Files (x86)","$env:LOCALAPPDATA" `
                     -Recurse -Include pluck.exe,Pluks.exe -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $hit) {
              Write-Host "--- msi-install.log (tail) ---"
              Get-Content msi-install.log -Tail 80 -ErrorAction SilentlyContinue
              Write-Host "--- registered products matching plu ---"
              Get-ItemProperty "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*","HKLM:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*" -ErrorAction SilentlyContinue |
                Where-Object { $_.DisplayName -match 'plu' } | Format-List DisplayName,InstallLocation,DisplayVersion
              throw "pluck.exe / Pluks.exe not found anywhere after install"
            }
            $exe = $hit.FullName
          }
          Write-Host "Found $exe"
          "PLUKS_EXE=$exe" >> $env:GITHUB_ENV

      - name: Launch and assert alive after 30s
        env:
          PLUKS_POLL_DEBUG: "1"
        run: |
          # Launch via a batch file so stdout/stderr are REAL file handles.
          # Start-Process -RedirectStandardError is a .NET pipe pumped by THIS
          # pwsh process: when the step ends the pump dies, later app output is
          # lost, and writes to the broken pipe fail (which eprintln! turned
          # into an app-killing panic — fixed app-side too, but the harness
          # shouldn't manufacture that environment in the first place).
          "@echo off`r`n`"$env:PLUKS_EXE`" 1>> app-stdout.log 2>> app-stderr.log" |
            Set-Content launch.cmd -Encoding ascii
          Start-Process cmd -ArgumentList "/c", "launch.cmd"
          Start-Sleep -Seconds 5
          # Derive the process name from the exe the locate step actually
          # found (pluck.exe today, Pluks.exe if Tauri ever renames it), and
          # pin to a single process — Get-Process returns a collection when
          # several match, and a collection's .HasExited is always truthy.
          $procName = [IO.Path]::GetFileNameWithoutExtension($env:PLUKS_EXE)
          $proc = Get-Process -Name $procName -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $proc) {
            Write-Host "--- stderr ---"; Get-Content app-stderr.log -ErrorAction SilentlyContinue
            throw "$procName not running 5s after launch"
          }
          "PLUKS_PID=$($proc.Id)" >> $env:GITHUB_ENV
          Start-Sleep -Seconds 25
          if ($proc.HasExited) {
            Write-Host "--- stderr ---"; Get-Content app-stderr.log -ErrorAction SilentlyContinue
            throw "Pluks exited within 30s"
          }
          Write-Host "Pluks alive after 30s (pid $($proc.Id))"
          Get-Content app-stderr.log -ErrorAction SilentlyContinue | Select-Object -First 20

      # The capture pipeline under test: clipboard poller -> decide_poll ->
      # SQLite history. This runs without any input hooks or permissions
      # (start_clipboard_poller is unconditional in lib.rs), so it works even
      # if the runner session can't install low-level input hooks.
      - name: Capture pipeline - clipboard write lands in history DB
        run: |
          # pwsh-side view of the clipboard sequence counter: if it advances
          # here but the app's poller never sees a change (its heartbeat log),
          # the two processes disagree about the window station.
          Add-Type -Namespace W -Name U -MemberDefinition '[DllImport("user32.dll")] public static extern uint GetClipboardSequenceNumber();'
          $marker = "pluks-ci-smoke-$(Get-Random)"
          $db = Join-Path $env:APPDATA "app.pluks.desktop\pluck.db"
          $env:PLUKS_DB = $db
          $env:PLUKS_MARKER = $marker
          Write-Host "clipboard seq before write: $([W.U]::GetClipboardSequenceNumber())"
          Set-Clipboard -Value $marker
          Write-Host "clipboard seq after write: $([W.U]::GetClipboardSequenceNumber())"
          Write-Host "Wrote marker '$marker', polling $db"
          # Select -Last 1 guards the [int] cast: if python ever prints a
          # banner/warning line, $hit becomes an array and the cast throws,
          # bypassing the diagnostic branch this loop exists to feed.
          $found = $false
          foreach ($i in 1..40) {            # poller ticks ~500ms; ~25s wall incl. python spawns
            Start-Sleep -Milliseconds 500
            if (Test-Path $db) {
              $hit = python -c "import os,sqlite3; con=sqlite3.connect(os.environ['PLUKS_DB']); print(sum(1 for (c,) in con.execute('SELECT content FROM history') if os.environ['PLUKS_MARKER'] in c))" | Select-Object -Last 1
              if ([int]$hit -gt 0) { $found = $true; break }
            }
          }
          if (-not $found) {
            if (Test-Path $db) {
              python -c "import os,sqlite3; con=sqlite3.connect(os.environ['PLUKS_DB']); [print(repr(r)) for r in con.execute('SELECT id, substr(content,1,80), copied_at FROM history')]"
            } else { Write-Host "history DB never appeared" }
            throw "marker never appeared in pluck.db history"
          }
          Write-Host "First capture OK after ~$([Math]::Round($i*0.5,1))s"

          # A second clip proves the poll loop survives past one capture.
          # Polled like the first one — a single fixed-delay check flakes
          # whenever the runner stalls (AV scan, msiexec cleanup) for >3s.
          Set-Clipboard -Value "$marker-second"
          $env:PLUKS_MARKER2 = "$marker-second"
          $found2 = $false
          foreach ($j in 1..20) {            # 10s budget
            Start-Sleep -Milliseconds 500
            $hit2 = python -c "import os,sqlite3; con=sqlite3.connect(os.environ['PLUKS_DB']); print(sum(1 for (c,) in con.execute('SELECT content FROM history') if os.environ['PLUKS_MARKER2'] in c))" | Select-Object -Last 1
            if ([int]$hit2 -gt 0) { $found2 = $true; break }
          }
          if (-not $found2) { throw "second clip never captured - poller died after first capture?" }

          $p = Get-Process -Id $env:PLUKS_PID -ErrorAction SilentlyContinue
          if (-not $p) { throw "Pluks process died during the capture test" }
          Write-Host "Capture pipeline verified: both clips recorded, process alive"

      - name: Stop app
        if: always()
        run: |
          if ($env:PLUKS_PID) { Stop-Process -Id $env:PLUKS_PID -Force -ErrorAction SilentlyContinue }

      # The artifact has everything, but failures must also be readable
      # straight from the job log (the artifact needs a browser to fetch).
      - name: Print diagnostics into job log
        if: always()
        run: |
          Write-Host "=== app-stderr.log ==="
          Get-Content app-stderr.log -Tail 60 -ErrorAction SilentlyContinue
          Write-Host "=== app-stdout.log ==="
          Get-Content app-stdout.log -Tail 20 -ErrorAction SilentlyContinue
          Write-Host "=== pluks-panic.log ==="
          Get-Content "$env:TEMP\pluks-panic.log" -ErrorAction SilentlyContinue
          Write-Host "=== history table ==="
          $db = Join-Path $env:APPDATA "app.pluks.desktop\pluck.db"
          if (Test-Path $db) {
            $env:PLUKS_DB = $db
            python -c "import os,sqlite3; con=sqlite3.connect(os.environ['PLUKS_DB']); [print(r) for r in con.execute('SELECT id, substr(content,1,60), copied_at FROM history')]"
          } else { Write-Host "(no pluck.db)" }

      - name: Collect diagnostics
        if: always()
        run: |
          New-Item -Force -ItemType Directory diag | Out-Null
          Copy-Item app-stdout.log,app-stderr.log,msi-install.log diag -ErrorAction SilentlyContinue
          Copy-Item "$env:TEMP\pluks-panic.log" diag -ErrorAction SilentlyContinue
          Copy-Item (Join-Path $env:APPDATA "app.pluks.desktop\*") diag -ErrorAction SilentlyContinue
          Copy-Item C:\werdumps\* diag -ErrorAction SilentlyContinue
          Get-WinEvent -FilterHashtable @{LogName='Application'; StartTime=(Get-Date).AddHours(-1)} -ErrorAction SilentlyContinue |
            Where-Object { $_.ProviderName -in 'Application Error','Windows Error Reporting','.NET Runtime' -or $_.Message -match 'Pluks' } |
            Format-List TimeCreated,ProviderName,Id,Message | Out-File diag\eventlog.txt
          Get-Process | Sort-Object ProcessName | Format-Table -AutoSize | Out-File diag\processes.txt

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-smoke-diagnostics
          path: diag
          retention-days: 7
