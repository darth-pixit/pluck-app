name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libxtst-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev

      - name: Install frontend dependencies
        working-directory: app
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Add TAURI_SIGNING_PRIVATE_KEY / APPLE_* secrets for signing
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: "Pluks ${{ github.ref_name }}"
          releaseBody: |
            ## What's new
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ## Installation
            - **macOS**: Download `.dmg`, open it, drag Pluks to Applications. Grant Accessibility + Input Monitoring permissions when prompted.
            - **Windows**: Run the `.msi` installer.
            - **Linux**: Make the `.AppImage` executable (`chmod +x`) and run it, or install the `.deb`.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
