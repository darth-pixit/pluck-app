name: Release

on:
  push:
    tags:
      - "v*"
  # Manual release from the Actions tab (works in the GitHub mobile web UI):
  # tap "Run workflow" and either leave the tag blank to release the version
  # currently in tauri.conf.json, or type an explicit vX.Y.Z. The tag is
  # created at the chosen ref by the create-release job below, so no local
  # git is needed.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (blank = v<version> from tauri.conf.json)"
        required: false
        type: string

jobs:
  # Create the draft release first, then all build jobs upload to it
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Resolve the release tag once for both triggers:
      #   - push: take it from the pushed ref (refs/tags/vX.Y.Z)
      #   - workflow_dispatch: use the typed input, or default to
      #     v<version> from tauri.conf.json so a blank "Run workflow" just
      #     ships the current source version.
      # The format check (vX.Y.Z) also sanitizes the user-supplied input
      # before it's used downstream.
      - name: Resolve release tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
            if [ -z "$TAG" ]; then
              VERSION=$(python3 -c "import json; print(json.load(open('app/src-tauri/tauri.conf.json'))['version'])")
              TAG="v$VERSION"
            fi
          else
            TAG="${REF#refs/tags/}"
          fi
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Resolved tag '$TAG' is not a vX.Y.Z tag."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"

      # Guard against releasing without bumping the source version. tauri-action
      # builds whatever version is in tauri.conf.json, so a tag like v0.2.13
      # cut from a tree still on 0.2.12 produces a 0.2.12 manifest — clients
      # already on 0.2.12 then never see an update. Fail fast instead.
      - name: Verify tag matches source version
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          TAG_VERSION="${TAG#v}"
          SRC=$(python3 -c "import json; print(json.load(open('app/src-tauri/tauri.conf.json'))['version'])")
          if [ "$TAG_VERSION" != "$SRC" ]; then
            echo "::error::Tag $TAG does not match tauri.conf.json version $SRC. Bump the source version before releasing."
            exit 1
          fi

      - name: Find or create release
        id: create
        uses: actions/github-script@v7
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        with:
          script: |
            const fs = require('fs');
            const tag = process.env.TAG;
            // Tag may have been pushed standalone (workflow creates the draft),
            // created via GitHub's "Draft a new release" UI (release already
            // exists), or requested via workflow_dispatch (no git tag yet —
            // createRelease below creates it at context.sha). Either path
            // should work — find first, create only if missing.
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.info(`Reusing existing release ${data.id} for tag ${tag}`);
              return data.id;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            // Pull the matching section out of CHANGELOG.md so each release
            // ships with its own notes. Section heading is "## [<tag>]",
            // running until the next "## " or end of file. Falls back to a
            // generic pointer when no entry exists yet.
            let notes = `See [CHANGELOG.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CHANGELOG.md) for details.`;
            if (fs.existsSync('CHANGELOG.md')) {
              const lines = fs.readFileSync('CHANGELOG.md', 'utf8').split('\n');
              const header = `## [${tag}]`;
              let start = -1, end = lines.length;
              for (let i = 0; i < lines.length; i++) {
                if (start === -1 && lines[i].startsWith(header)) {
                  start = i + 1;
                } else if (start !== -1 && lines[i].startsWith('## ')) {
                  end = i;
                  break;
                }
              }
              if (start !== -1) {
                notes = lines.slice(start, end).join('\n').trim();
              } else {
                core.warning(`No CHANGELOG.md entry for ${tag}; using generic body.`);
              }
            }

            const body = [
              `## What's new`,
              ``,
              notes,
              ``,
              `## Installation`,
              `- **macOS**: Download \`.dmg\`, open it, drag Pluks to Applications. Grant Accessibility + Input Monitoring permissions when prompted.`,
              `- **Windows**: Run the \`.msi\` installer.`,
              `- **Linux**: Make the \`.AppImage\` executable (\`chmod +x\`) and run it, or install the \`.deb\`.`,
            ].join('\n');

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              // For workflow_dispatch there is no git tag yet; GitHub creates
              // it at this commit. For a pushed tag this is ignored.
              target_commitish: context.sha,
              name: `Pluks ${tag}`,
              body,
              draft: true,
              prerelease: false,
            });
            return data.id;
          result-encoding: string

  upload-extension:
    needs: create-release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package extension zip
        run: |
          cd extension
          zip -r ../pluks-extension.zip manifest.json content.js background.js popup.html popup.js icons/

      - name: Upload extension to release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = fs.readFileSync('pluks-extension.zip');
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              name: 'pluks-extension.zip',
              data,
            });

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # One universal2 binary that runs natively on both Apple Silicon
          # and Intel — no Rosetta, and no per-arch download to pick wrong.
          # tauri-action maps the single universal artifact to BOTH the
          # darwin-aarch64 and darwin-x86_64 updater keys, so existing
          # installs on either arch still auto-update.
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # Belt-and-suspenders for the current windows-latest runner image:
      # `dtolnay/rust-toolchain@stable`'s own `rustup default stable` step
      # has been intermittently no-op'ing on Windows AND, worse, the
      # runner's pre-installed `cargo.exe` has been observed to BE
      # `rustup-init.exe` itself rather than the rustup shim — so any
      # `cargo <subcommand>` invocation hits rustup-init's argparse and
      # dies with "unexpected argument 'check'". `rustup default` alone
      # can't fix that, because there is no real cargo shim on PATH to
      # delegate to.
      #
      # Bootstrap rustup from scratch into `~/.cargo/bin`, then prepend
      # that to GITHUB_PATH so every subsequent step (including
      # tauri-action's internal `cargo build`) resolves to the freshly
      # installed shim instead of whatever broken stub came with the
      # image. Idempotent: if the user's already happens to be fine,
      # this just reinstalls over the same files. `--quiet -y` skips
      # the interactive confirmations.
      - name: Bootstrap Rust toolchain (Windows image workaround)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $rustupInit = "$env:TEMP\rustup-init.exe"
          Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile $rustupInit
          & $rustupInit --default-toolchain stable --profile minimal -y --quiet
          if ($LASTEXITCODE -ne 0) { throw "rustup-init failed with $LASTEXITCODE" }
          # Prepend the freshly-installed cargo bin so future steps win
          # the PATH race against the runner's pre-installed (and broken)
          # cargo.exe stub.
          "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          # Probe by absolute path so the result doesn't depend on PATH
          # ordering inside this step.
          & "$env:USERPROFILE\.cargo\bin\cargo.exe" --version
          & "$env:USERPROFILE\.cargo\bin\rustc.exe" --version
          & "$env:USERPROFILE\.cargo\bin\rustup.exe" show active-toolchain

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libxtst-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev

      - name: Install frontend dependencies
        working-directory: app
        run: npm install

      # ── macOS: import signing certificate ────────────────────────────────────
      - name: Import Apple certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD:          ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          echo "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:               ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater archive signing keys. Generate once with
          #   npx @tauri-apps/cli signer generate -w ~/.tauri/pluks.key
          # and store the resulting .key contents as TAURI_SIGNING_PRIVATE_KEY
          # (with its password as TAURI_SIGNING_PRIVATE_KEY_PASSWORD). The
          # matching public key goes into tauri.conf.json -> plugins.updater.pubkey.
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
          # Emits per-platform signature entries; the publish step below
          # merges them into a single latest.json for the updater endpoint.
          includeUpdaterJson: true

      # ── macOS: notarize + staple the DMG, then replace the release asset ─────
      - name: Notarize and staple DMG
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_ID:       ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:  ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID:     ${{ needs.create-release.outputs.release_id }}
        run: |
          TARGET=$(echo "${{ matrix.args }}" | sed 's/--target //')
          DMG_DIR="app/src-tauri/target/${TARGET}/release/bundle/dmg"

          for DMG in "$DMG_DIR"/*.dmg; do
            DMG_NAME=$(basename "$DMG")

            echo "Notarizing $DMG_NAME..."
            xcrun notarytool submit "$DMG" \
              --apple-id  "$APPLE_ID" \
              --password  "$APPLE_PASSWORD" \
              --team-id   "$APPLE_TEAM_ID" \
              --wait

            echo "Stapling $DMG_NAME..."
            xcrun stapler staple "$DMG"

            # Delete the un-stapled asset uploaded by tauri-action, then re-upload
            echo "Replacing release asset $DMG_NAME..."
            ASSET_ID=$(curl -sS \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets" \
              | python3 -c "import sys,json; assets=json.load(sys.stdin); \
                match=[a for a in assets if a['name']=='${DMG_NAME}']; \
                print(match[0]['id'] if match else '')")
            if [ -n "$ASSET_ID" ]; then
              curl -sS -X DELETE \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/releases/assets/${ASSET_ID}"
              echo "Deleted old asset $ASSET_ID"
            fi
            curl -f -sS \
              -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=${DMG_NAME}" \
              --data-binary "@${DMG}" \
              | python3 -c "import sys,json; r=json.load(sys.stdin); print(f'Uploaded: {r[\"name\"]} ({r[\"size\"]} bytes)')"
          done

  publish-release:
    needs: [create-release, build, upload-extension]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
              make_latest: true,
            });

  # Install/launch/capture the JUST-PUBLISHED Windows MSI on a real runner.
  # This is what backs the website/README claim that every release is
  # install- and run-tested on Windows. Non-blocking by nature (the release
  # is already out), but a red here is the earliest possible signal that the
  # shipped installer is broken.
  windows-smoke:
    needs: publish-release
    uses: ./.github/workflows/windows-smoke.yml
    with:
      msi_source: latest-release
