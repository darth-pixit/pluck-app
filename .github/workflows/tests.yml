name: Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

# Cancel in-progress runs for the same ref to save CI minutes.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend unit + component tests (vitest) ────────────────────────────────
  app-unit:
    name: App unit + component (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  # ── Rust unit tests for the Tauri lib ───────────────────────────────────────
  app-rust:
    name: App Rust (cargo test)
    runs-on: ubuntu-latest
    # Tauri's dep graph is heavy — a cold-cache rebuild on a 2-core runner
    # routinely takes 20+ minutes (any Cargo.lock change invalidates the
    # rust-cache key, e.g. a `chore: bump` commit). 25 m hit timeout for
    # the v0.4.1 bump merge; bumped to 40 m so cold-cache cases complete
    # rather than terminate the run and starve subsequent cache writes.
    timeout-minutes: 40
    defaults:
      run:
        working-directory: app/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target
      - name: Install Linux Tauri build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev libxdo-dev
      - run: cargo test --lib

  # ── Tauri build smoke test (catches Rust compile regressions) ───────────────
  app-build-smoke:
    name: App build smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target
      - name: Install Linux Tauri build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev libxdo-dev
      - run: npm ci
      - name: Cargo check (compiles cleanly)
        working-directory: app/src-tauri
        run: cargo check --release

  # ── Browser-extension Playwright tests ──────────────────────────────────────
  extension:
    name: Extension Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright (under xvfb so MV3 SW activates)
        run: xvfb-run -a -s "-screen 0 1280x720x24" npx playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: extension-playwright-report
          path: extension/playwright-report
          retention-days: 7

  # ── Website Playwright tests ────────────────────────────────────────────────
  website:
    name: Website Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: website-playwright-report
          path: website/playwright-report
          retention-days: 7
