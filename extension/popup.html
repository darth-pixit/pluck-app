<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pluks History</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      max-height: 520px;
      background: #111;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }

    header span.logo {
      font-size: 18px;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      flex: 1;
    }

    button.clear-btn {
      background: none;
      border: 1px solid #333;
      color: #888;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
    }

    button.clear-btn:hover {
      color: #e55;
      border-color: #e55;
    }

    .search-wrap {
      padding: 8px 12px;
      border-bottom: 1px solid #1c1c1c;
      flex-shrink: 0;
    }

    .search-wrap input {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      color: #e8e8e8;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      transition: border-color 0.1s;
    }

    .search-wrap input:focus {
      border-color: #FC4C02;
    }

    .search-wrap input::placeholder {
      color: #555;
    }

    .list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .list::-webkit-scrollbar { width: 4px; }
    .list::-webkit-scrollbar-track { background: transparent; }
    .list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 14px;
      cursor: pointer;
      transition: background 0.08s;
      border-bottom: 1px solid #181818;
    }

    .item:last-child { border-bottom: none; }

    .item:hover {
      background: #1c1c1c;
    }

    .item:hover .copy-hint {
      opacity: 1;
    }

    .item-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #ccc;
      line-height: 1.4;
    }

    .item-time {
      font-size: 10px;
      color: #444;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .copy-hint {
      font-size: 10px;
      color: #FC4C02;
      opacity: 0;
      flex-shrink: 0;
      margin-top: 2px;
      transition: opacity 0.1s;
    }

    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 40px 20px;
      color: #444;
      text-align: center;
    }

    .empty .icon { font-size: 32px; }
    .empty p { font-size: 12px; line-height: 1.5; }

    .copied-flash {
      background: #1a2a1a !important;
    }
  </style>
</head>
<body>
  <header>
    <span class="logo">⚡</span>
    <h1>Pluks History</h1>
    <button class="clear-btn" id="clearBtn">Clear all</button>
  </header>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search history…" autofocus />
  </div>
  <div class="list" id="list"></div>

  <script src="popup.js"></script>
</body>
</html>
